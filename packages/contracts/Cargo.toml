[workspace]
resolver = "2"
members = ["contracts/*"]

[workspace.dependencies]
# Version-aligned with stellar-cli 27.x; exposes the P25/P26 BN254 + Poseidon host
# functions Attestar's verifier needs.
soroban-sdk = "27.0.0-rc.1"

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
codegen-units = 1
lto = true
panic = "abort"
